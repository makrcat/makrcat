name: Update README cards

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10&theme=dracula&custom_title=Top%20Languages
          path: cards/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}